<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="meta-description" name="description" content="Galeria Momentum — fotografii de la lecțiile gratuite de duminică.">
  <meta name="theme-color" content="#ffffff">
  <title>Galerie — Momentum</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body data-page="gallery">
  <a class="skip-link" href="#main" data-i18n="skipLink">Sari la conținut</a>

  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="/index.html" data-i18n-aria="brandHome">
        <img src="/assets/momentum-logo.png" alt="Momentum — From knowledge to infinity">
      </a>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="main-nav" data-i18n-aria="menuOpen"><span></span><span></span></button>
      <nav class="main-nav" id="main-nav" data-i18n-aria="mainNavigation">
        <a href="/index.html#about" data-i18n="navAbout">Despre noi</a>
        <a href="/index.html#how" data-i18n="navHow">Cum funcționează</a>
        <a href="/index.html#schedule" data-i18n="navSchedule">Program</a>
        <a class="active" href="/gallery.html" data-i18n="navGallery">Galerie</a>
        <a href="/index.html#contact" data-i18n="navContact">Contact</a>
        <a class="mobile-enroll" href="/index.html#join" data-i18n="navEnroll">Înscrie-te</a>
        <div class="languages" role="group" data-i18n-aria="languageSelect">
          <button class="active" type="button" data-lang="ro" aria-pressed="true">RO</button>
          <button type="button" data-lang="ru" aria-pressed="false">RU</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="gallery-hero" id="gallery">
      <div class="container gallery-hero-grid">
        <div>
          <h1 data-i18n="galleryTitle">Galerie foto</h1>
          <p data-i18n="galleryIntro">Fotografii de la lecțiile și activitățile Momentum.</p>
        </div>
      </div>
    </section>

    <section class="gallery-content">
      <div class="container">
        <div class="gallery-list" data-gallery-list></div>
        <p class="gallery-source"><span data-i18n="gallerySource">Fotografii de pe contul oficial</span> <a href="https://www.instagram.com/momentum_organization/" target="_blank" rel="noopener">@momentum_organization</a></p>
      </div>
    </section>

    <div class="lightbox" hidden aria-hidden="true">
      <div class="lightbox-backdrop" data-lightbox-close></div>
      <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="Galerie foto" data-i18n-aria="lightboxLabel">
        <button class="lightbox-close" type="button" aria-label="Închide fotografia" data-i18n-aria="lightboxClose">×</button>
        <button class="lightbox-arrow lightbox-previous" type="button" aria-label="Fotografia anterioară" data-i18n-aria="lightboxPrevious">←</button>
        <div class="lightbox-preview"><img src="" alt="" data-lightbox-image></div>
        <button class="lightbox-arrow lightbox-next" type="button" aria-label="Fotografia următoare" data-i18n-aria="lightboxNext">→</button>
        <p class="lightbox-counter" aria-live="polite"></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-wrap">
      <div class="footer-logo"><img src="/assets/momentum-logo.png" alt="Momentum"></div>
      <div><span>© <span id="year"></span> Momentum Club</span><span data-i18n="footerNote">Club educațional gratuit</span></div>
    </div>
  </footer>
</body>
</html>
